version: '3.8'

services:
  user-db:
    image: postgres
    container_name: user-service-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - user-network

  user-service:
    build: .
    container_name: user-service-app
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT}:8080"
    environment:
      #Профиль для докера
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # JWT конфигурация
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      - user-db
    networks:
      - user-network
      - shared-network

  user-minio:
    image: minio/minio
    container_name: minio-user-storage
    restart: unless-stopped
    ports:
      - "9090:9000"       # API Port
      - "9091:9001"       # Console UI Port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - user-network
      - shared-network

networks:
  user-network:
    driver: bridge
  shared-network:
    driver: bridge
    external: true
    name: shared-network

volumes:
  user_db_data:
  minio_data: